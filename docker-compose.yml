version: '3.8'

services:
  duckbill:
    build: .
    container_name: duckbill
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: ${DATASOURCE_URL:-jdbc:oracle:thin:@oracle.fiap.com.br:1521:orcl}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME:-rm560027}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD:-270304}
      JWT_SECRET: ${JWT_SECRET:-duckbill-super-secret-key-change-this-in-production-1234567890}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
