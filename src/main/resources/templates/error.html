<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Erro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="brand">DuckBill</div>
</header>

<div class="container">
    <div class="card">
        <h2>Algo deu errado</h2>
        <p class="error" th:text="${error}">Erro inesperado.</p>
        <a class="btn" th:href="@{/app/dashboard}">Voltar ao dashboard</a>
    </div>
</div>
</body>
</html>
