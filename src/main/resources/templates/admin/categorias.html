<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Admin categorias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="brand">DuckBill</div>
    <nav class="nav">
        <a th:href="@{/app/dashboard}">Dashboard</a>
        <a th:href="@{/app/despesas/nova}">Nova despesa</a>
        <a th:href="@{/app/transacoes/nova}">Nova transação</a>
        <a th:href="@{/admin/categorias}">Admin categorias</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Sair</button>
        </form>
    </nav>
</header>

<div class="container">
    <div class="grid grid-2">
        <div class="card">
            <h2>Categorias</h2>
            <p class="success" th:if="${success}" th:text="${success}"></p>
            <p class="error" th:if="${error}" th:text="${error}"></p>
            <div th:if="${#lists.isEmpty(categorias)}" class="hint">Sem categorias cadastradas.</div>
            <div th:each="c : ${categorias}" class="top3-item">
                <span th:text="${c.nome}">Categoria</span>
                <form th:action="@{'/admin/categorias/' + ${c.id} + '/delete'}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-danger" type="submit">Excluir</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h2>Nova categoria</h2>
            <form th:action="@{/admin/categorias}" th:object="${form}" method="post" class="form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div>
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" maxlength="60" required>
                    <div class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>
                <button class="btn btn-secondary" type="submit">Criar categoria</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
