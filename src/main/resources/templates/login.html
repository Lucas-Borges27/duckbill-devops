<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <div class="login-wrap">
        <div class="card login-card">
            <div class="brand">DuckBill</div>
            <p class="hint">Controle financeiro simples e inteligente.</p>

            <form th:action="@{/login}" method="post" class="form-row">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div>
                    <label for="username">Email</label>
                    <input id="username" name="username" type="email" placeholder="seu@email.com" required>
                </div>
                <div>
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <button class="btn" type="submit">Entrar</button>
            </form>

            <p class="error" th:if="${param.error}">Credenciais inválidas.</p>
            <p class="success" th:if="${param.logout}">Sessão encerrada com sucesso.</p>
        </div>
    </div>
</body>
</html>
