<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Editar despesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="brand">DuckBill</div>
    <nav class="nav">
        <a th:href="@{/app/dashboard}">Dashboard</a>
        <a th:href="@{/app/despesas/nova}">Despesas</a>
        <a th:href="@{/app/transacoes/nova}">Nova transação</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Sair</button>
        </form>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h2>Editar despesa</h2>
        <form th:action="@{'/app/despesas/' + ${despesaId} + '/editar'}" th:object="${form}" method="post" class="form-row">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label>Categoria</label>
                <select th:field="*{categoriaId}" required>
                    <option value="">Selecione</option>
                    <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></div>
            </div>
            <div>
                <label>Valor</label>
                <input type="number" step="0.01" th:field="*{valor}" required>
                <div class="error" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
            </div>
            <div class="grid grid-2">
                <div>
                    <label>Moeda</label>
                    <input type="text" th:field="*{moeda}" maxlength="3">
                    <div class="error" th:if="${#fields.hasErrors('moeda')}" th:errors="*{moeda}"></div>
                </div>
                <div>
                    <label>Data da compra</label>
                    <input type="date" th:field="*{dataCompra}" required>
                    <div class="error" th:if="${#fields.hasErrors('dataCompra')}" th:errors="*{dataCompra}"></div>
                </div>
            </div>
            <div>
                <label>Descrição</label>
                <textarea rows="3" th:field="*{descricao}"></textarea>
            </div>
            <button class="btn" type="submit">Salvar alterações</button>
        </form>
    </div>
</div>
</body>
</html>
