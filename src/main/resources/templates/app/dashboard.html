<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="brand">DuckBill</div>
    <nav class="nav">
        <a th:href="@{/app/dashboard}">Dashboard</a>
        <a th:href="@{/app/despesas/nova}">Nova despesa</a>
        <a th:href="@{/app/transacoes/nova}">Nova transação</a>
        <a th:href="@{/admin/categorias}" sec:authorize="hasRole('ADMIN')">Admin categorias</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Sair</button>
        </form>
    </nav>
</header>

<div class="container">
    <div class="grid grid-2">
        <div class="card">
            <h2>Resumo do mês</h2>
            <form th:action="@{/app/dashboard}" method="get" class="form-row">
                <div>
                    <label for="mes">Mês</label>
                    <input id="mes" name="mes" type="month" th:value="${mes}">
                </div>
                <button class="btn" type="submit">Atualizar</button>
            </form>
            <p class="hint">Usuário: <span th:text="${usuario.nome}">Nome</span></p>
            <div class="card" style="margin-top: 12px;">
                <div class="pill">Total do mês</div>
                <h1 th:text="${#numbers.formatDecimal(totalMes,1,2)}">0,00</h1>
            </div>
        </div>

        <div class="card">
            <h2>Top 3 categorias</h2>
            <div th:if="${#lists.isEmpty(top3)}" class="hint">Sem dados para o período.</div>
            <div th:each="item : ${top3}" class="top3-item">
                <span th:text="${item.categoria}">Categoria</span>
                <strong th:text="${#numbers.formatDecimal(item.total,1,2)}">0,00</strong>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top: 16px;">
        <h2>Insights</h2>
        <ul>
            <li th:each="insight : ${insights}" th:text="${insight}">Insight</li>
        </ul>
    </div>
</div>
</body>
</html>
