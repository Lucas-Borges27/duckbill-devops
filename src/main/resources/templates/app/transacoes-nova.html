<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DuckBill | Nova transação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="brand">DuckBill</div>
    <nav class="nav">
        <a th:href="@{/app/dashboard}">Dashboard</a>
        <a th:href="@{/app/despesas/nova}">Nova despesa</a>
        <a th:href="@{/app/transacoes/nova}">Nova transação</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Sair</button>
        </form>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h2>Nova transação de ativo</h2>
        <p class="success" th:if="${success}" th:text="${success}"></p>
        <form th:action="@{/app/transacoes/nova}" th:object="${form}" method="post" class="form-row">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label>Ativo</label>
                <select th:field="*{ativoId}" required>
                    <option value="">Selecione</option>
                    <option th:each="a : ${ativos}" th:value="${a.id}" th:text="${a.ticker}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('ativoId')}" th:errors="*{ativoId}"></div>
            </div>
            <div class="grid grid-2">
                <div>
                    <label>Tipo</label>
                    <select th:field="*{tipo}" required>
                        <option value="">Selecione</option>
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                </div>
                <div>
                    <label>Data do negócio</label>
                    <input type="date" th:field="*{dataNegocio}" required>
                    <div class="error" th:if="${#fields.hasErrors('dataNegocio')}" th:errors="*{dataNegocio}"></div>
                </div>
            </div>
            <div class="grid grid-2">
                <div>
                    <label>Quantidade</label>
                    <input type="number" step="0.0001" th:field="*{qtd}" required>
                    <div class="error" th:if="${#fields.hasErrors('qtd')}" th:errors="*{qtd}"></div>
                </div>
                <div>
                    <label>Preço</label>
                    <input type="number" step="0.000001" th:field="*{preco}" required>
                    <div class="error" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}"></div>
                </div>
            </div>
            <button class="btn" type="submit">Salvar transação</button>
        </form>
    </div>

    <div class="grid grid-2" style="margin-top: 16px;">
        <div class="card">
            <h2>Resumo da carteira</h2>
            <div th:if="${#lists.isEmpty(carteira)}" class="hint">Sem posições registradas.</div>
            <div th:each="item : ${carteira}" class="top3-item">
                <span>
                    <strong th:text="${item.ticker}">Ticker</strong>
                    <span class="hint">Qtd: <span th:text="${#numbers.formatDecimal(item.quantidadeAtual,1,4)}">0</span></span>
                </span>
                <strong th:text="${#numbers.formatDecimal(item.financeiroLiquido,1,2)}">0,00</strong>
            </div>
        </div>

        <div class="card">
            <h2>Histórico das transações</h2>
            <div th:if="${#lists.isEmpty(transacoes)}" class="hint">Sem transações cadastradas.</div>
            <div th:each="t : ${transacoes}" class="top3-item">
                <span>
                    <strong th:text="${t.ativo.ticker}">Ativo</strong>
                    <span class="hint" th:text="${t.tipo}">BUY</span>
                    <span class="hint" th:text="${#temporals.format(t.dataNegocio, 'dd/MM/yyyy')}">data</span>
                </span>
                <strong>
                    <span th:text="${#numbers.formatDecimal(t.qtd,1,4)}">0</span>
                    <span>x</span>
                    <span th:text="${#numbers.formatDecimal(t.preco,1,2)}">0,00</span>
                </strong>
            </div>
        </div>
    </div>
</div>
</body>
</html>
